services:
  - type: web
    name: voting-system
    rootDir: voting_system
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /index.html
    envVars:
      - key: APP_BASE_PATH
        value: ""
      - key: PRESENTATION_MODE
        value: "1"
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: "voting_system"
      - key: VOTE_ENCRYPTION_KEY
        generateValue: true
      - key: DEFAULT_ADMIN_USERNAME
        sync: false
      - key: DEFAULT_ADMIN_PASSWORD
        sync: false
      - key: DEFAULT_ADMIN_EMAIL
        sync: false
